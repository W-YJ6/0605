<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>化工脱硫设备数字孪生 · 设备物联管理后台</title>
<link rel="stylesheet" href="./css/admin.css" />
<!-- ECharts：运行报表使用；bootcdn 主用，失败回退 npmmirror -->
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.1/echarts.min.js"></script>
<script>
  if (!window.echarts) { document.write('<script src="https://registry.npmmirror.com/echarts/5.5.1/files/dist/echarts.min.js"><\/script>'); }
</script>
</head>
<body>

<!-- ===== 应用（未登录时由 admin.js 跳转回大屏统一登录入口）===== -->
<div id="app">
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="logo"><span class="mark">硫</span><span>智硫物联</span></div>
    <nav class="menu" id="menu"></nav>
  </aside>

  <!-- 主区 -->
  <div class="main">
    <header class="topbar">
      <div class="crumb" id="crumb">首页</div>
      <div class="spacer"></div>
      <a class="top-tool" href="../index.html"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1"/><path d="M8 20h8M12 16v4"/></svg> 监控大屏</a>
      <div class="top-tool"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg> 简体中文</div>
      <div class="user"><span class="avatar">A</span><span>admin</span></div>
      <div class="top-tool" id="btn-logout" title="退出登录"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h4a1 1 0 011 1v14a1 1 0 01-1 1h-4M9 12h11M16 8l4 4-4 4"/></svg> 退出</div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal-mask" id="modal-mask">
  <div class="modal">
    <div class="modal-head"><span>标题</span><span class="m-close">✕</span></div>
    <div class="modal-body"></div>
    <div class="modal-foot">
      <button class="btn2" id="m-cancel">取消</button>
      <button class="btn2 primary" id="m-ok">确定</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="./js/api.js"></script>
<script src="./js/admin.js"></script>
</body>
</html>
